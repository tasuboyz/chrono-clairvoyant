services:
  app:
    image: chrono-clairvoyant:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
        VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
    environment:
      # Caddy legge DOMAIN per configurare il virtual host + HTTPS
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Volume persistente per certificati Let's Encrypt
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/robots.txt"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  caddy_data:
    driver: local
  caddy_config:
    driver: local
